<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaForm AI – We’ve Moved</title>

  <!-- 3 second redirect -->
  <meta http-equiv="refresh" content="3; url=https://instaform.ayushx.tech" />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #0f0f1a 0%, #050509 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 16px;
      background: rgba(20, 20, 35, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 0 60px rgba(139, 92, 246, 0.15);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    .domain {
      font-weight: 600;
      color: #a855f7;
    }

    .button {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      background: linear-gradient(90deg, #8b5cf6, #d946ef);
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s ease;
    }

    .button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .countdown {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>We’ve Moved 🚀</h1>
    <p>
      InstaForm AI is now available at<br />
      <span class="domain">instaform.ayushx.tech</span>
    </p>

    <a href="https://instaform.ayushx.tech" class="button">
      Go to New Website
    </a>

    <div class="countdown">
      Redirecting automatically in <span id="timer">3</span> seconds...
    </div>
  </div>

  <script>
    let timeLeft = 3;
    const timer = document.getElementById("timer");

    const countdown = setInterval(() => {
      timeLeft--;
      timer.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(countdown);
        window.location.href = "https://instaform.ayushx.tech";
      }
    }, 1000);
  </script>

</body>
</html>
